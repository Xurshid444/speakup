const $ = id => document.getElementById(id);
const toast = (m, d=3000) => {
  const t = $('toast');
  if (t) { t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), d); }
};
const scrollB = id => { const e = $(id); if(e) e.scrollTop = e.scrollHeight; };
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const setSt = m => window.parent.postMessage({type:'set_status', msg:m}, '*');

function getState() {
  try { return JSON.parse(localStorage.getItem('su_state') || '{}'); } catch(e) { return {}; }
}
function sendState(patch) {
  const s = getState(); Object.assign(s, patch);
  localStorage.setItem('su_state', JSON.stringify(s));
  window.parent.postMessage({type:'state_update', payload:s}, '*');
}
function switchTab(name) {
  window.parent.postMessage({type:'switch_tab', tab:name}, '*');
}
async function waitForKey() {
  return new Promise(resolve => {
    const s = getState();
    if (s.groqKey) { resolve(true); return; }
    window.parent.postMessage({type:'need_key'}, '*');
    const h = e => {
      if (e.data && e.data.type === 'set_key') {
        window.removeEventListener('message', h); resolve(true);
      }
    };
    window.addEventListener('message', h);
  });
}
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'set_key') {
    const s = getState(); s.groqKey = e.data.key;
    localStorage.setItem('su_state', JSON.stringify(s));
  }
});

let curAudio=null;
async function speak(text,cb){
  if(!text||!text.trim())return; if(curAudio){curAudio.pause();curAudio.src='';curAudio=null;} window.speechSynthesis.cancel();
  if(S.elKey) {
    try{
      setSt('Ovoz tayyorlanmoqda...');
      const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${S.elVoice}`,{
        method:'POST', headers:{'xi-api-key':S.elKey,'Content-Type':'application/json','Accept':'audio/mpeg'},
        body:JSON.stringify({text,model_id:'eleven_turbo_v2',voice_settings:{stability:0.5,similarity_boost:0.75,speed:S.speed}})
      });
      if(r.ok){
        const blob=await r.blob();
        if(blob.size>500){
          const url=URL.createObjectURL(blob); curAudio=new Audio(url);
          if(cb)curAudio.onended=cb; setSt('Tayyor'); await curAudio.play().catch(()=>{}); return;
        }
      } else {
        const err=await r.json().catch(()=>({}));
        if(err?.detail?.status==='quota_exceeded'){
          toast('⚠️ ElevenLabs limiti tugadi — brauzer TTS ga o\'tildi'); $('el-status').textContent='⚠️ Oylik limit tugagan! Keyingi oyga qadar brauzer TTS ishlatilmoqda.'; $('el-limit-fill').style.width='100%'; $('el-limit-fill').style.background='#ff5a5a';
        } else console.warn('EL error:',err?.detail);
      }
    }catch(e){ console.warn('EL failed:',e.message); }
    setSt('Tayyor');
  }
  browserSpeak(text,cb);
}

function browserSpeak(text,cb){
  const doIt=()=>{
    const vv=window.speechSynthesis.getVoices(); const u=new SpeechSynthesisUtterance(text); u.lang=S.accent; u.rate=S.speed; u.pitch=1.05;
    if(S.pickedVoice){ const v=vv.find(x=>x.name===S.pickedVoice.name); if(v)u.voice=v; }
    if(cb)u.onend=cb; window.speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length===0) window.speechSynthesis.addEventListener('voiceschanged',doIt,{once:true}); else doIt();
}
function getQ(text){ const lines=text.split('\n').filter(l=>l.trim()); for(let i=lines.length-1;i>=0;i--)if(lines[i].includes('?'))return lines[i]; return lines[lines.length-1]||text; }

async function groq(sys,msgs){
  if(!S.groqKey){
    const ok=await waitForKey();
    if(!ok) throw new Error('API key kiritilmadi');
  }
  setSt("AI o'ylayapti...");
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST', headers:{'Authorization':`Bearer ${S.groqKey}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:S.model,messages:[{role:'system',content:sys},...msgs],temperature:0.82,max_tokens:600})
  });
  const d=await r.json(); if(d.error)throw new Error(d.error.message);
  // Token usage tracking
  if(d.usage){ trackGroqUsage(d.usage.total_tokens||0); }
  // Rate limit info from headers
  const rl={ remain:r.headers.get('x-ratelimit-remaining-tokens'), reset:r.headers.get('x-ratelimit-reset-tokens') };
  if(rl.remain!==null){ const el=$('groq-rate-info'); if(el) el.textContent=`Rate limit: ${Number(rl.remain).toLocaleString()} token qoldi${rl.reset?' · reset: '+rl.reset:''}`; }
  setSt('Tayyor'); return d.choices[0].message.content;
}

// ════════════════════════════
// GROQ TOKEN TRACKER
// ════════════════════════════
function groqUsageKey(type){ const d=new Date(); return type==='day'?`groq_day_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`:`groq_mon_${d.getFullYear()}_${d.getMonth()}`; }
function trackGroqUsage(tokens){
  const dk=groqUsageKey('day'), mk=groqUsageKey('mon');
  const dayUsed=(parseInt(localStorage.getItem(dk)||'0'))+tokens;
  const monUsed=(parseInt(localStorage.getItem(mk)||'0'))+tokens;
  localStorage.setItem(dk, dayUsed); localStorage.setItem(mk, monUsed);
  renderGroqUsage();
}
function renderGroqUsage(){
  const dk=groqUsageKey('day'), mk=groqUsageKey('mon');
  const dayUsed=parseInt(localStorage.getItem(dk)||'0');
  const monUsed=parseInt(localStorage.getItem(mk)||'0');
  const dayLim=parseInt(localStorage.getItem('groq_day_limit')||'14400');
  const monLim=parseInt(localStorage.getItem('groq_mon_limit')||'500000');
  const dayPct=Math.min(100,Math.round(dayUsed/dayLim*100));
  const monPct=Math.min(100,Math.round(monUsed/monLim*100));
  const $g=id=>document.getElementById(id); if(!$g('groq-day-val'))return;
  $g('groq-day-val').textContent=dayUsed.toLocaleString();
  $g('groq-day-limit-lbl').textContent=dayLim.toLocaleString();
  $g('groq-mon-val').textContent=monUsed.toLocaleString();
  $g('groq-mon-limit-lbl').textContent=monLim.toLocaleString();
  $g('groq-day-limit-inp').value=dayLim;
  $g('groq-mon-limit-inp').value=monLim;
  const hsEl=document.getElementById('hs-tokens');
  if(hsEl) hsEl.textContent=dayUsed>999?(dayUsed/1000).toFixed(1)+'K':String(dayUsed||0);
  const dayBar=$g('groq-day-bar'); if(dayBar){dayBar.style.width=dayPct+'%';
  dayBar.style.background=dayPct>90?'var(--red)':dayPct>70?'var(--gold)':'var(--accent)';}
  const monBar=$g('groq-mon-bar'); if(monBar){monBar.style.width=monPct+'%';
  monBar.style.background=monPct>90?'var(--red)':monPct>70?'var(--gold)':'var(--blue)';}
}

// MIKROFON VA MESSAGES YORDAMCHILARI
// ════════════════════════════
let sharedStream=null;
async function reqMic(){ try{sharedStream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){} }
async function getStream(){
  if(sharedStream&&sharedStream.active)return sharedStream;
  sharedStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000}}); return sharedStream;
}
function makeMic(cfg){
  const idle=$(cfg.idle),recst=$(cfg.recst),rev=$(cfg.rev);
  const recBtn=$(cfg.rec),stopBtn=$(cfg.stop),delBtn=$(cfg.del),sndBtn=$(cfg.snd);
  const tbox=$(cfg.tbox),wave=$(cfg.wave); let mr=null,chunks=[],ablob=null;
  const setStatus=(txt,on=false)=>{ if(!tbox)return; tbox.textContent=txt; tbox.classList.toggle('on',on); };
  const showI=()=>{idle.style.display='flex';recst.style.display='none';rev.style.display='none';wave.classList.remove('show');setStatus('Bosib gapiring...',false);};
  const showR=()=>{idle.style.display='none';recst.style.display='flex';rev.style.display='none';wave.classList.add('show');};
  const showV=()=>{idle.style.display='none';recst.style.display='none';rev.style.display='flex';wave.classList.remove('show');};
  async function startRec(){
    window.speechSynthesis.cancel(); if(curAudio){curAudio.pause();curAudio=null;} chunks=[];ablob=null; setStatus('🔴 Yozilmoqda...',true);showR();
    let stream; try{stream=await getStream();}catch(e){toast('❌ Mikrofon ruxsati berilmagan!');showI();return;}
    const fmts=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']; const fmt=fmts.find(f=>MediaRecorder.isTypeSupported(f))||'';
    mr=new MediaRecorder(stream,fmt?{mimeType:fmt}:{}); mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{ ablob=new Blob(chunks,{type:mr.mimeType||'audio/webm'}); const url=URL.createObjectURL(ablob); setStatus('✅ Yozildi — eshiting yoki yuboring',true); showV(); };
    mr.start(250);
  }
  recBtn.addEventListener('click',startRec); stopBtn.addEventListener('click',()=>{if(mr&&mr.state!=='inactive')mr.stop();});
  delBtn.addEventListener('click',()=>{ablob=null;chunks=[];showI();});
  sndBtn.addEventListener('click',async()=>{
    if(!ablob){toast("Ovoz yo'q!");return;}
    if(!S.groqKey){ const ok=await waitForKey(); if(!ok) return; }
    const b=ablob;ablob=null;chunks=[]; setStatus('⏳ Tanilmoqda...',true);showI();
    try{
      const fd=new FormData(); const ext=b.type.includes('mp4')?'mp4':b.type.includes('ogg')?'ogg':'webm'; const file=new File([b],`a.${ext}`,{type:b.type});
      fd.append('file',file); fd.append('model','whisper-large-v3-turbo'); fd.append('language','en'); fd.append('response_format','text');
      const r=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{ method:'POST',headers:{'Authorization':`Bearer ${S.groqKey}`},body:fd });
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Xato: '+r.status);}
      const txt=(await r.text()).trim(); showI();
      if(!txt){toast("Hech narsa eshitilmadi");return;} cfg.onSend(txt);
    }catch(e){toast('❌ '+e.message);showI();}
  });
}

function teacherAvatar(){ return S.accent==='en-GB'?TEACHER_F:TEACHER_M; }

function addMsg(role,text,areaId){
  $(areaId).querySelectorAll('.empty-hint').forEach(e=>e.remove());
  const div=document.createElement('div'); div.className=`msg ${role}`;
  const av=document.createElement('div'); av.className=`av ${role==='ai'?'a':'u'}`;
  if(role==='ai') av.innerHTML=teacherAvatar(); else av.textContent='👤';
  const bub=document.createElement('div'); bub.className='bubble';
  if(role==='ai'){
    const idx=text.indexOf('❌'); const main=idx>0?text.slice(0,idx).trim():idx===0?'':text; const corr=idx>=0?text.slice(idx).trim():'';
    if(main){const p=document.createElement('div');p.textContent=main;bub.appendChild(p);}
    if(corr){const cb=document.createElement('div');cb.className='corr';cb.innerHTML=`<div class="corr-lbl">🔍 Tuzatish</div>${esc(corr)}`;bub.appendChild(cb);}
    // Tugmalar qatori
    const btns=document.createElement('div');btns.style.cssText='display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;';
    const spk=document.createElement('button');spk.className='spk';spk.innerHTML='🔊 Eshitish';spk.onclick=()=>speak(getQ(text));btns.appendChild(spk);
    const trnBtn=document.createElement('button');trnBtn.className='trn-btn';trnBtn.innerHTML='🇺🇿 Tarjima';
    const trnBox=document.createElement('div');trnBox.className='trn-box';
    let translated=false;
    trnBtn.onclick=async()=>{
      if(trnBox.classList.contains('show')){trnBox.classList.remove('show');trnBtn.innerHTML='🇺🇿 Tarjima';return;}
      if(translated){trnBox.classList.add('show');trnBtn.innerHTML='🙈 Yashirish';return;}
      trnBtn.innerHTML='⏳...';trnBtn.disabled=true;
      try{
        const src=main||(corr||text);
        const r=await groq('Translate the following English text to Uzbek. Return ONLY the Uzbek translation, no explanations.',[{role:'user',content:src}]);
        trnBox.textContent=r.trim();trnBox.classList.add('show');translated=true;trnBtn.innerHTML='🙈 Yashirish';
      }catch(e){trnBox.textContent='Tarjima yuklanmadi';trnBox.classList.add('show');}
      trnBtn.disabled=false;
    };
    btns.appendChild(trnBtn);
    bub.appendChild(btns);
    bub.appendChild(trnBox);
  }else{bub.textContent=text;}
  div.appendChild(av); div.appendChild(bub); $(areaId).appendChild(div); scrollB(areaId);
}

// ════════════════════════════
// STATE & HELPERS
// ════════════════════════════

let bookHist = [];
let _curUnit = null, _curLesson = null;

function renderBookUnits() {
  const grid = $('unit-grid'); if(!grid) return; grid.innerHTML = '';
  BOOK.forEach((u, i) => {
    const c = document.createElement('div'); c.className = 'unit-card';
    c.innerHTML = `<div class="un">${u.unit===0?'Welcome':'Unit '+u.unit}</div><div class="ut">${u.emoji} ${u.label}</div><div class="uts">${u.topics}</div>`;
    c.addEventListener('click', () => showBookLessons(i)); grid.appendChild(c);
  });
}
function showBookLessons(ui) {
  const u = BOOK[ui]; $('bv-units').style.display='none'; $('bv-lessons').style.display='block';
  $('bunit-head').textContent = `${u.emoji} ${u.unit===0?'Welcome':'Unit '+u.unit}: ${u.label}`;
  $('bunit-sub').textContent = u.topics;
  const list = $('blessons'); list.innerHTML = '';
  u.lessons.forEach((l, j) => {
    const item = document.createElement('div'); item.className = 'li';
    item.innerHTML = `<span class="ltag">${l.tag}</span><div class="linfo"><div class="lname">${l.title}</div><div class="ldesc">${l.focus}</div></div><span style="color:var(--text3);font-size:18px;">›</span>`;
    item.addEventListener('click', () => startBookLesson(ui, j)); list.appendChild(item);
  });
}
$('back-units').addEventListener('click', () => { $('bv-lessons').style.display='none'; $('bv-units').style.display='block'; });
$('back-lessons').addEventListener('click', () => {
  window.speechSynthesis.cancel(); if(curAudio){curAudio.pause();curAudio=null;}
  $('bv-chat').style.display='none'; $('bv-lessons').style.display='block'; bookHist = [];
});

function bookSys() {
  const S = getState(); const u = _curUnit; const l = _curLesson;
  const fb = S.feedbackLang==='uz' ? 'Give ALL corrections in UZBEK. Conversation in ENGLISH.' : 'All in English.';
  return `You are a warm English coach using Navigate Beginner A1. Lesson: ${l.tag} — "${l.title}" | Focus: ${l.focus}. Key vocabulary: ${l.vocab.map(v=>v.en).join(', ')}. Student level: ${S.level}. Rules: 1) Natural English conversation. 2) One question at a time. 3) Correct errors:\n❌ Xato: [error] ✅ To'g'ri: [correct] 💡 Izoh: [explanation]\n4) ${fb} 5) SHORT — 2-3 sentences.`;
}
async function startBookLesson(ui, li) {
  _curUnit = BOOK[ui]; _curLesson = _curUnit.lessons[li]; bookHist = [];
  $('bv-lessons').style.display='none'; $('bv-chat').style.display='flex';
  $('cl-tag').textContent = `${_curUnit.unit===0?'Welcome':'Unit '+_curUnit.unit} › ${_curLesson.tag}`;
  $('cl-title').textContent = _curLesson.title;
  $('cl-vocab').textContent = "📚 So'zlar: " + _curLesson.vocab.map(v=>v.en).join(', ');
  $('book-chat').innerHTML = ''; addThink('book-chat');
  try {
    const res = await groq(bookSys(), []);
    rmThink(); bookHist.push({role:'assistant',content:res});
    addMsg('ai', res, 'book-chat'); setTimeout(() => speak(getQ(res)), 400);
  } catch(e) { rmThink(); toast('❌ '+e.message); }
}
async function sendBook(text) {
  addMsg('user', text, 'book-chat'); bookHist.push({role:'user',content:text}); addThink('book-chat');
  try {
    const res = await groq(bookSys(), bookHist.slice(-10));
    rmThink(); bookHist.push({role:'assistant',content:res});
    addMsg('ai', res, 'book-chat'); setTimeout(() => speak(getQ(res)), 400);
  } catch(e) { rmThink(); toast('❌ '+e.message); }
}

makeMic({idle:'bi',recst:'br',rev:'bv',rec:'brec',stop:'bstop',del:'bdel',snd:'bsnd',tbox:'tb-book',wave:'wv-book',onSend:(text)=>sendBook(text)});
renderBookUnits();
